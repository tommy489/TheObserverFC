[build]
  publish = "."

# Edge function injects article OG tags for Twitter/Discord previews
[[edge_functions]]
  function = "og-inject"
  path = "/article/*"

# Serve index.html for all article routes (SPA routing)
[[redirects]]
  from = "/article/*"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
